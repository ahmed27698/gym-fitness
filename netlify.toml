[build]
  base = "."
  command = "npm run generate"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback (Nuxt / Vue routing)
[[redirects]]
  from = "/*"
  to = "/200.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/_nuxt/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"